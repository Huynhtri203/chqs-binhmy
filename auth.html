<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ thống Tài khoản Công dân</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .auth-box {
      max-width: 400px;
      margin: 40px auto;
      padding: 30px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
    }
    .auth-toggle {
      display: flex;
      justify-content: space-around;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
    }
    .auth-toggle button {
      padding: 10px 20px;
      font-weight: 700;
      color: var(--text-muted);
      font-size: 15px;
    }
    .auth-toggle button.active {
      color: var(--red);
      border-bottom: 3px solid var(--red);
      margin-bottom: -2px;
    }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
    .or-separator {
      text-align: center;
      margin: 20px 0;
      position: relative;
      font-size: 13px;
      color: var(--text-muted);
    }
    .or-separator::before, .or-separator::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .or-separator::before { left: 0; }
    .or-separator::after { right: 0; }
    .google-btn-flex {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }
    .user-profile {
      text-align: center;
      padding: 20px 0;
    }
    .avatar-large {
      width: 70px;
      height: 70px;
      background: var(--red-light);
      color: var(--red);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .btn-logout {
      background: #7B1113;
      color: white;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-weight: 600;
      margin-top: 16px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="auth-container" class="auth-box">
      <div class="auth-toggle">
        <button id="tab-login" class="active" onclick="switchTab('login')">ĐĂNG NHẬP</button>
        <button id="tab-register" onclick="switchTab('register')">ĐĂNG KÝ</button>
      </div>

      <div id="auth-error" class="err-msg" style="margin-bottom: 15px;"></div>

      <div id="panel-login" class="form-panel active">
        <form onsubmit="handleAuth(event, 'login')">
          <div class="input-group">
            <label class="search-label">Email</label>
            <input type="email" id="login-email" class="field-input" required placeholder="nhap@email.com">
          </div>
          <div class="input-group">
            <label class="search-label">Mật khẩu</label>
            <input type="password" id="login-pass" class="field-input" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn-search" style="margin-top: 10px;">Đăng Nhập</button>
        </form>

        <div class="or-separator">Hoặc đăng nhập bằng</div>
        
        <div class="google-btn-flex">
          <div id="g_id_onload"
               data-client_id="ĐIỀN_CLIENT_ID_GOOGLE_CỦA_BẠN_VÀO_ĐÂY"
               data-callback="handleCredentialResponse"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
        </div>
      </div>

      <div id="panel-register" class="form-panel">
        <form onsubmit="handleAuth(event, 'register')">
          <div class="input-group">
            <label class="search-label">Họ và Tên</label>
            <input type="text" id="reg-name" class="field-input" required placeholder="Nguyễn Văn A">
          </div>
          <div class="input-group">
            <label class="search-label">Email</label>
            <input type="email" id="reg-email" class="field-input" required placeholder="nhap@email.com">
          </div>
          <div class="input-group">
            <label class="search-label">Mật khẩu</label>
            <input type="password" id="reg-pass" class="field-input" required placeholder="Tối thiểu 6 ký tự">
          </div>
          <button type="submit" class="btn-search" style="margin-top: 10px;">Tạo Tài Khoản</button>
        </form>
      </div>
    </div>

    <div id="profile-container" class="auth-box" style="display: none;">
      <div class="user-profile">
        <div class="avatar-large" id="user-avatar">?</div>
        <h2 id="user-display-name" style="margin-bottom: 4px;">Xin chào!</h2>
        <p id="user-display-email" style="color: var(--text-muted); font-size: 14px;"></p>
        
        <div style="margin-top: 20px; padding: 12px; background: var(--surface-alt); border-radius: var(--radius); font-size: 13px; text-align: left;">
          ✅ Bạn đã đăng nhập vào hệ thống Cổng thông tin. Lịch sử truy cập đã được ghi nhận trên hệ thống dữ liệu đám mây.
        </div>
        
        <button class="btn-logout" onclick="logout()">Đăng Xuất</button>
      </div>
    </div>

  </div>

  <script>
    // Dán link Web App Apps Script ở Bước 1 vào đây
    const APPS_SCRIPT_URL = "THAY_LINK_WEB_APP_APPS_SCRIPT_CỦA_BẠN_VÀO_ĐÂY";

    function switchTab(tab) {
      document.getElementById('auth-error').style.display = 'none';
      if(tab === 'login') {
        document.getElementById('tab-login').classList.add('active');
        document.getElementById('tab-register').classList.remove('active');
        document.getElementById('panel-login').classList.add('active');
        document.getElementById('panel-register').classList.remove('active');
      } else {
        document.getElementById('tab-register').classList.add('active');
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('panel-register').classList.add('active');
        document.getElementById('panel-login').classList.remove('active');
      }
    }

    // Xử lý đăng ký / đăng nhập thường
    async function handleAuth(event, action) {
      event.preventDefault();
      const errEl = document.getElementById('auth-error');
      errEl.style.display = 'none';

      let payload = { action: action };

      if(action === 'register') {
        payload.name = document.getElementById('reg-name').value;
        payload.email = document.getElementById('reg-email').value;
        payload.password = document.getElementById('reg-pass').value;
      } else {
        payload.email = document.getElementById('login-email').value;
        payload.password = document.getElementById('login-pass').value;
        payload.type = 'Normal';
      }

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const res = await response.json();

        if(res.ok) {
          if(action === 'register') {
            alert(res.msg);
            switchTab('login');
          } else {
            // Đăng nhập thành công, lưu trạng thái
            saveSession(payload.email, res.name);
          }
        } else {
          errEl.textContent = "⚠️ " + res.msg;
          errEl.style.display = 'flex';
        }
      } catch (e) {
        errEl.textContent = "⚠️ Lỗi kết nối hệ thống dữ liệu.";
        errEl.style.display = 'flex';
      }
    }

    // Xử lý phản hồi từ Google khi Đăng nhập bằng Google thành công
    async function handleCredentialResponse(response) {
      // Giải mã dữ liệu JWT token trả về từ phía Google để lấy Email và Tên
      const base64Url = response.credential.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));

      const googleUser = JSON.parse(jsonPayload);
      
      // Gửi sang Sheets để lưu và ghi lịch sử log đăng nhập
      let payload = {
        action: 'login',
        type: 'Google',
        email: googleUser.email,
        name: googleUser.name
      };

      try {
        await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        saveSession(googleUser.email, googleUser.name);
      } catch (e) {
        alert("Lỗi đồng bộ dữ liệu tài khoản Google.");
      }
    }

    function saveSession(email, name) {
      localStorage.setItem('user_email', email);
      localStorage.setItem('user_name', name);
      checkSession();
    }

    function checkSession() {
      const email = localStorage.getItem('user_email');
      const name = localStorage.getItem('user_name');

      if(email && name) {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('profile-container').style.display = 'block';
        document.getElementById('user-display-name').textContent = name;
        document.getElementById('user-display-email').textContent = email;
        document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
      } else {
        document.getElementById('auth-container').style.display = 'block';
        document.getElementById('profile-container').style.display = 'none';
      }
    }

    async function logout() {
      const email = localStorage.getItem('user_email');
      if(email) {
        // Gửi lệnh ghi nhận Đăng xuất lên file Google Sheet lịch sử
        try {
          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'logout', email: email })
          });
        } catch(e){}
      }
      localStorage.removeItem('user_email');
      localStorage.removeItem('user_name');
      checkSession();
    }

    // Tự động kiểm tra trạng thái đăng nhập khi tải trang
    window.onload = checkSession;
  </script>
</body>
</html>
